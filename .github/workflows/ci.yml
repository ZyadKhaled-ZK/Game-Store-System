name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: GameStore_CI_P@ss123
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GameStore_CI_P@ss123' -Q 'SELECT 1' -C 2>/dev/null || exit 1"
          --health-interval 10s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GameStore.PL123/GameStore.PL.sln

      - name: Build
        run: dotnet build GameStore.PL123/GameStore.PL.sln -c Release --no-restore

      - name: Test
        run: dotnet test GameStore.PL123/GameStore.Tests/GameStore.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Publish
        run: dotnet publish GameStore.PL123/Game-Store/GameStore.PL.csproj -c Release -o publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamestore-app
          path: publish/
