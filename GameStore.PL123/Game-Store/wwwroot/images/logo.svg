<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" fill="none">
  <defs>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFF000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFF000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="260" height="100" rx="8" fill="#07090e"/>

  <!-- Glow behind text -->
  <text x="130" y="68" font-family="monospace,sans-serif" font-size="56" font-weight="bold" fill="#FFF000" text-anchor="middle" letter-spacing="8" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/>
    GS
  </text>

  <!-- Main text -->
  <text x="130" y="68" font-family="monospace,sans-serif" font-size="56" font-weight="bold" fill="#FFF000" text-anchor="middle" letter-spacing="8">GS</text>

  <!-- Scan line across text -->
  <rect x="60" y="30" width="140" height="30" fill="url(#scanGrad)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="-200,0;200,0;-200,0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated underline -->
  <line x1="70" y1="76" x2="190" y2="76" stroke="#52BEDC" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x1" values="70;190;70" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- Corner dots -->
  <circle cx="30" cy="20" r="2" fill="#52BEDC" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="20" r="2" fill="#52BEDC" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="30" cy="80" r="2" fill="#52BEDC" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="230" cy="80" r="2" fill="#52BEDC" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>